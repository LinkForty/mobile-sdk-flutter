name: linkforty_flutter
description: "LinkForty SDK for Flutter: deferred deep linking, mobile attribution, and conversion tracking. An open-source alternative to AppsFlyer OneLink and Branch."
version: 0.1.1
homepage: https://linkforty.com
repository: https://github.com/LinkForty/mobile-sdk-flutter
issue_tracker: https://github.com/LinkForty/mobile-sdk-flutter/issues
documentation: https://docs.linkforty.com

topics:
  - deep-linking
  - attribution
  - analytics
  - deferred-deep-linking
  - sdk

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  app_links: ^7.0.0
  device_info_plus: ^13.1.0
  http: ^1.6.0
  json_annotation: ^4.10.0
  logger: ^2.6.2
  package_info_plus: ^10.1.0
  shared_preferences: ^2.5.4
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.12.0
  build_runner: ^2.11.1
  mockito: ^5.6.3
  # Required by generated mocks in test/ (device_info_plus return types).
  device_info_plus_platform_interface: ^8.1.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
